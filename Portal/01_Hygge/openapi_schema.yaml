openapi: 3.1.0
info:
  title: Training Calendar and Food Log Gateway
  version: 1.1.0
  description: GPT Action schema for Cloudflare Worker -> GAS gateway

servers:
  - url: https://lively-frost-9183.woshijianglingjie.workers.dev

paths:

  /read:
    post:
      operationId: readGatewayAction
      summary: Read-only actions (get_day_type / get_today_intake_summary / get_user_vocab)
      x-openai-isConsequential: false
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReadRequest'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
        '502':
          description: GAS redirect fetch failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'

  /write:
    post:
      operationId: writeGatewayAction
      summary: Write actions (append_food_rows / upsert_user_vocab)
      x-openai-isConsequential: true
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WriteRequest'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'
        '502':
          description: GAS redirect fetch failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  schemas:

    ReadRequest:
      type: object
      required:
        - action
      properties:
        action:
          type: string
          enum:
            - get_day_type
            - get_today_intake_summary
            - get_user_vocab
          description: >
            get_day_type -> date (+ optional timezone).
            get_today_intake_summary -> spreadsheet_id, sheet_name, date.
            get_user_vocab -> spreadsheet_id (+ optional sheet_name).
        date:
          type: string
          description: YYYY-MM-DD
          pattern: '^\d{4}-\d{2}-\d{2}$'
        timezone:
          type: string
          default: Asia/Tokyo
        spreadsheet_id:
          type: string
        sheet_name:
          type: string

    WriteRequest:
      type: object
      required:
        - action
      properties:
        action:
          type: string
          enum:
            - append_food_rows
            - upsert_user_vocab
          description: >
            append_food_rows -> spreadsheet_id, sheet_name, request_id, rows.
            upsert_user_vocab -> spreadsheet_id, entry (+ optional sheet_name).
        spreadsheet_id:
          type: string
        sheet_name:
          type: string
        request_id:
          type: string
          description: >
            Idempotency key. Format: yyyyMMdd-HHmmss-4hex (e.g. 20250409-143022-a3f1).
            Reuse same request_id on retries for the same batch.
        rows:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/FoodRow'
        entry:
          $ref: '#/components/schemas/UserVocabEntry'

    FoodRow:
      type: object
      additionalProperties: false
      required:
        - date
        - type
        - kcal
        - carb
        - protein
        - fat
      properties:
        date:
          type: string
          pattern: '^\d{4}-\d{2}-\d{2}$'
        type:
          type: string
          description: 早餐/午餐/晚餐/加餐/未指定
        kcal:
          type: number
        carb:
          type: number
        protein:
          type: number
        fat:
          type: number
        unit:
          type: string
        food:
          type: string
        brand:
          type: string
        note:
          type: string
        source:
          type: string
        scene:
          type: string
          description: 自炊/便利店/外食/外卖
        intake_time:
          type: string
          description: "HH:mm（草稿生成时自动填入 Asia/Tokyo 当前时间）"
          pattern: '^\d{2}:\d{2}$'
        updated:
          type: string
          description: Asia/Tokyo YYYY-MM-DD HH:mm:ss

    UserVocabEntry:
      type: object
      additionalProperties: false
      required:
        - phrase
      properties:
        phrase:
          type: string
        food:
          type: string
        kcal:
          type: number
        carb:
          type: number
        protein:
          type: number
        fat:
          type: number
        unit:
          type: string
        note:
          type: string

    GenericResponse:
      type: object
      additionalProperties: true
      properties:
        ok:
          type: boolean
        error:
          type: string
        action:
          type: string
        message:
          type: string
